# The versioned release pipeline (Tier 5 M2, ADR-098): build the distributed bins, wrap
# the runtime image, smoke the EXACT candidate on Compose + kind/Helm + the topology-parity
# tripwire, and only then publish to GHCR tagged {vX.Y.Z, X.Y.Z, sha-<short>} (the bare
# form is what the Helm chart's default image.tag = Chart.appVersion pulls).
#
# The image is the ONLY published artifact (ADR-098: the repo may go private later — no
# crates.io publish, no GitHub-Release binary tarballs, and no `:latest` tag, so an
# unpinned pull fails loud instead of silently floating). GHCR packages pushed from
# Actions inherit the repo's visibility.
#
# A `workflow_dispatch` run is the full DRY-RUN rehearsal: preflight → build → image →
# both smokes → parity, with the publish step skipped — so the pipeline is testable
# without minting a tag.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to rehearse (e.g. v0.1.0) — build + smoke, never publish"
        type: string
        required: true

concurrency: release-${{ github.ref }}

permissions:
  contents: read
  packages: write # GHCR push via GITHUB_TOKEN

env:
  CARGO_TARGET_DIR: ${{ github.workspace }}/engine/target
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: build + smoke + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Step 0 — fail loud on a version mismatch BEFORE spending minutes compiling:
      # the tag must equal engine/Cargo.toml [package].version AND the chart appVersion.
      # `inputs.version` reaches the shell ONLY via `env:` (never raw `${{ }}` inside
      # `run:`) — a dispatch input is attacker-shaped text and raw interpolation would be
      # a shell-injection path into a job holding `packages: write` (codex).
      - name: Version preflight (tag == Cargo.toml == Chart appVersion)
        env:
          RAW_VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
        run: |
          ./deploy/check-versions.sh "$RAW_VERSION"
          echo "VERSION=$RAW_VERSION" >> "$GITHUB_ENV"

      - name: Install pinned toolchain
        working-directory: engine
        run: rustc --version && cargo --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
          # Restores the distributed cache the ci.yml harness job saves on `main`
          # pushes; a tag build reads it and never churns it.
          shared-key: distributed
          save-if: false

      - name: Build node binaries (distributed)
        working-directory: engine
        run: >
          cargo build --release --features distributed
          --bin server --bin shardserver --bin controlserver

      # Wrap the natively-built bins in the runtime image (the harness-job pattern —
      # far faster than an in-container compile) with OCI labels linking the GHCR
      # package back to this repo + commit.
      - name: Build the candidate image
        run: |
          set -euo pipefail
          stage=$(mktemp -d)
          cp engine/target/release/{server,shardserver,controlserver} "$stage/"
          docker build -f deploy/Dockerfile.prebuilt \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=$VERSION" \
            -t reverse-rusty:candidate "$stage"

      # The release gate: the EXACT candidate image must serve on both remote
      # topologies before anything is published.
      - name: Compose smoke against the candidate
        run: RR_IMAGE=reverse-rusty:candidate ./deploy/cluster-smoke.sh

      - name: Install kind # kubectl + helm are preinstalled on ubuntu-latest; kind is not
        run: |
          curl -fsSLo kind https://kind.sigs.k8s.io/dl/v0.29.0/kind-linux-amd64
          chmod +x kind && sudo mv kind /usr/local/bin/kind
          kind version

      - name: Helm smoke on kind against the candidate
        run: RR_IMAGE=reverse-rusty:candidate ./deploy/k8s-smoke.sh

      - name: Topology parity (compose ≡ rendered chart)
        run: ./deploy/check-topology-parity.sh

      # Publish — tag pushes only (a dispatch run is the no-publish rehearsal).
      # Three tags, one digest: `vX.Y.Z` (the git-tag form), `X.Y.Z` (what the Helm
      # chart's default `image.tag` = Chart.appVersion pulls — codex: publishing only
      # the v-form would break a default `helm install` against GHCR), and
      # `sha-<short>`. Never `:latest`. Lowercase the owner (GHCR requires it).
      - name: Publish to GHCR ({vX.Y.Z, X.Y.Z, sha-<short>} — never :latest)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/reverse-rusty"
          short=$(git rev-parse --short HEAD)
          for tag in "$VERSION" "${VERSION#v}" "sha-$short"; do
            docker tag reverse-rusty:candidate "$image:$tag"
            docker push "$image:$tag"
          done
          echo "published $image:{$VERSION, ${VERSION#v}, sha-$short}"
