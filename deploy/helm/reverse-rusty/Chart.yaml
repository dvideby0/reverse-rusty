apiVersion: v2
name: reverse-rusty
description: |
  Reverse Rusty distributed cluster — a K-shard data plane (gRPC ShardService) +
  a durable openraft control plane + a stateless REST coordinator, from ONE image
  (deploy/Dockerfile), role chosen by command. The Kubernetes analogue of
  deploy/compose.cluster.yml (ADR-081/084): StatefulSets for shards + control
  (stable DNS + per-pod PVC), a Deployment for the coordinator, headless Services
  for shard/control DNS, native gRPC liveness/readiness probes (ADR-084).
type: application
# Chart version — bump on chart changes. appVersion tracks the engine crate.
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - search
  - percolator
  - reverse-query
home: https://github.com/dvideby0/reverse-rusty
sources:
  - https://github.com/dvideby0/reverse-rusty
