{{- /*
Token Secrets are operator-provided by default (referenced by name). create=true
templates them from values for DEV/CI ONLY — the value then lands in the release
manifest + Helm's release storage, so never use it for a real secret. The mesh TLS
Secret is ALWAYS operator-provided (cert-manager or gen-mesh-certs.sh) — never templated.
*/ -}}
{{- if .Values.clusterToken.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.clusterToken.secretName }}
  labels:
    {{- include "reverse-rusty.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.clusterToken.secretKey }}: {{ required "clusterToken.value is required when clusterToken.create=true" .Values.clusterToken.value | quote }}
{{- end }}
{{- if and .Values.auth.enabled .Values.auth.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.secretName }}
  labels:
    {{- include "reverse-rusty.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.secretKey }}: {{ required "auth.value is required when auth.create=true" .Values.auth.value | quote }}
{{- end }}
