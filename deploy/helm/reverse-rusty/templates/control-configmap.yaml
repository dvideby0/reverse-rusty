{{- if .Values.controlPlane.enabled }}
# The StatefulSet bootstrap dance (ADR-082): one shared pod template, per-ordinal args
# derived at runtime from $HOSTNAME (kubelet sets it to the pod name `<sts>-<ordinal>`).
# Ordinal 0 bootstraps the cluster from all peers + commits its routable advertise-URL;
# ordinals 1..N just serve and are initialized by node 0. All Helm substitutions are
# single-line so the literal block's indentation stays stable.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "reverse-rusty.controlName" . }}-entrypoint
  labels:
    {{- include "reverse-rusty.labels" . | nindent 4 }}
    app.kubernetes.io/component: control
data:
  entrypoint.sh: |
    #!/bin/sh
    set -eu
    ORD="${HOSTNAME##*-}"
    SCHEME="{{ include "reverse-rusty.scheme" . }}"
    PORT="{{ .Values.ports.controlGrpc }}"
    DOMAIN="{{ include "reverse-rusty.controlName" . }}.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}"
    REPLICAS={{ .Values.controlPlane.replicas }}
    SELF="${SCHEME}://${HOSTNAME}.${DOMAIN}:${PORT}"
    PEERS=""
    i=0
    while [ "$i" -lt "$REPLICAS" ]; do
      if [ "$i" != "$ORD" ]; then
        PEERS="${PEERS} --peer ${i}=${SCHEME}://{{ include "reverse-rusty.controlName" . }}-${i}.${DOMAIN}:${PORT}"
      fi
      i=$((i + 1))
    done
    TLS="{{ if .Values.tls.enabled }}--tls-cert /certs/{{ .Values.tls.certFile }} --tls-key /certs/{{ .Values.tls.keyFile }} --tls-ca /certs/{{ .Values.tls.caFile }}{{ end }}"
    HEALTH="--health-addr 0.0.0.0:{{ .Values.ports.controlHealth }}"
    echo "controlserver ord=${ORD} self=${SELF} peers=[${PEERS} ]"
    if [ "$ORD" = "0" ]; then
      exec controlserver 0 "0.0.0.0:${PORT}" --data-dir /data --bootstrap --advertise-url "${SELF}" ${PEERS} ${TLS} ${HEALTH}
    else
      exec controlserver "${ORD}" "0.0.0.0:${PORT}" --data-dir /data ${PEERS} ${TLS} ${HEALTH}
    fi
{{- end }}
