apiVersion: v1
kind: Service
metadata:
  name: {{ include "reverse-rusty.coordinatorName" . }}
  labels:
    {{- include "reverse-rusty.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
  {{- with .Values.coordinator.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.coordinator.service.type }}
  selector:
    {{- include "reverse-rusty.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
  ports:
    - name: http
      port: {{ .Values.ports.coordinatorHttp }}
      targetPort: http
{{- if .Values.coordinator.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "reverse-rusty.coordinatorName" . }}
  labels:
    {{- include "reverse-rusty.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
  {{- with .Values.coordinator.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.coordinator.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.coordinator.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.coordinator.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "reverse-rusty.coordinatorName" . }}
                port:
                  number: {{ .Values.ports.coordinatorHttp }}
{{- end }}
